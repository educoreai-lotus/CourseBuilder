<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Course Builder - AI-powered course creation and management platform" />
    <title>Course Builder | Educore AI</title>
    <!-- Persist Directory JWT before any third-party body scripts run -->
    <script>
      (function () {
        try {
          var hash = window.location.hash || '';
          if (!hash || hash.length < 2) return;

          var raw = hash.charAt(0) === '#' ? hash.slice(1) : hash;
          var token = null;
          var prefix = 'access_token=';
          var prefixIndex = raw.indexOf(prefix);

          if (prefixIndex !== -1) {
            var rest = raw.slice(prefixIndex + prefix.length);
            var amp = rest.indexOf('&');
            token = (amp === -1 ? rest : rest.slice(0, amp)).trim();
            if (token) {
              try {
                token = decodeURIComponent(token);
              } catch (e) {}
            }
          }

          if (!token) {
            token = new URLSearchParams(raw).get('access_token');
            if (token) token = String(token).trim();
          }

          if (token && String(token).trim()) {
            localStorage.setItem('auth_token', String(token).trim());
            history.replaceState({}, document.title, location.pathname + location.search);
          }
        } catch (error) {
          console.warn('[CourseBuilder Auth] access token bootstrap failed');
        }
      })();
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body>
    <div id="root"></div>
    
    <!-- ✅ EDUCORE BOT - DO NOT MODIFY -->
    <div id="edu-bot-container"></div>
    <!-- ✅ END BOT CONTAINER -->
    
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- ✅ BOT SCRIPT (deferred so auth bootstrap ingests #access_token first) -->
    <script defer src="https://rag-production-3a4c.up.railway.app/embed/bot.js"></script>
    <!-- ✅ END BOT SCRIPT -->
  </body>
</html>
